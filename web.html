<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=https://www.youtube.com/watch?v=Aq5WXmQQooo" />
  <title>Blue ⚡ Web</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --card: rgba(15, 23, 42, .82);
      --blue: #2563eb;
      --cyan: #38bdf8;
      --text: #e5f0ff;
      --muted: #93a4bd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(37, 99, 235, .32), transparent 34%),
        radial-gradient(circle at 80% 30%, rgba(56, 189, 248, .24), transparent 30%),
        linear-gradient(135deg, #020617, var(--bg));
      color: var(--text);
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      padding: 34px;
      border: 1px solid rgba(148, 163, 184, .2);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
      text-align: center;
      backdrop-filter: blur(18px);
    }
    .bolt {
      width: 68px;
      height: 68px;
      display: inline-grid;
      place-items: center;
      border-radius: 22px;
      margin-bottom: 18px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 18px 50px rgba(37,99,235,.35);
      font-size: 32px;
      animation: pulse 1.4s infinite ease-in-out;
    }
    h1 { margin: 0 0 10px; font-size: clamp(26px, 6vw, 40px); }
    p { margin: 0 0 22px; color: var(--muted); line-height: 1.6; }
    a {
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      font-weight: 800;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: .9; }
    }
  </style>
  <script>
    window.location.replace('https://www.youtube.com/watch?v=Aq5WXmQQooo');
  </script>
</head>
<body>
  <main class="card">
    <div class="bolt">⚡</div>
    <h1>Blue Web lädt...</h1>
    <p>Du wirst weitergeleitet. Falls nichts passiert, klicke unten.</p>
    <a href="https://www.youtube.com/watch?v=Aq5WXmQQooo">Weiter öffnen</a>
  </main>
</body>
</html>
